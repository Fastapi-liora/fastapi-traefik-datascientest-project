name: Deploy Prod

on:
  push:
    branches:
      - main
  workflow_dispatch: #workflow can also get started manually in github
    inputs:
      image_tag:
        description: "Image tag to deploy to prod"
        required: true
        default: "latest" #the latest images is used for deployment not a specific one

permissions:
  contents: read # workflow can read the repo but not write
  packages: write # workflow can write new images to the github registry

env: # location of registry and images
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fastapi-liora
  BACKEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-backend
  FRONTEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-frontend

concurrency: # multiple deployments can run paralell, might not be optimal, "true" might be better to cancel outdated deployments before starting a new one
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test-backend: # deploy-dev includes tests in case there are some in the testfolder here in deploy-prod tests are not yet run
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests
        run: |
          echo "Backend-Testschritte aus deploy-dev hier einsetzen"

  test-frontend:
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run frontend tests
        run: |
          echo "Frontend-Testschritte aus deploy-dev hier einsetzen"

  build-and-push:
    if: github.event_name == 'push'
    runs-on: self-hosted
    needs: # jobs that need to be finished first
      - test-backend
      - test-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR #Authorization
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} ./backend
          docker tag $BACKEND_IMAGE:${{ github.sha }} $BACKEND_IMAGE:latest

      - name: Build frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./frontend
          docker tag $FRONTEND_IMAGE:${{ github.sha }} $FRONTEND_IMAGE:latest

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Push frontend image
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

  deploy-prod:
    if: github.event_name == 'workflow_dispatch' # manual start only
    runs-on: self-hosted # runs on vm
    environment:
      name: prod # mvp we use only 1 environment for the pipelines and a shared secret

    steps:
      - uses: actions/checkout@v4

      - name: Set deploy tag
        run: echo "DEPLOY_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV # default is "latest"

      - name: Show selected images # creates log files which images get deployed
        run: |
          echo "Backend image: $BACKEND_IMAGE:$DEPLOY_TAG"
          echo "Frontend image: $FRONTEND_IMAGE:$DEPLOY_TAG"

      - name: Set up kubectl # installs kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig # runner gets access to the cluster using github secrets to deploy
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Check cluster access
        run: |
          kubectl get ns # lists the existing namespaces

      - name: Deploy manifests #reads and applies yamls from the kubernetes manifests
        run: |
          kubectl apply -f k8s/prod

      - name: Update backend image #deployment
        run: |
          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:$DEPLOY_TAG \
            -n prod

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:$DEPLOY_TAG \
            -n prod

      - name: Show prod resources before rollout check # logs
        run: |
          kubectl get all -n prod
          kubectl get pods -n prod -o wide
          kubectl get rs -n prod

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend -n prod --timeout=300s

      - name: Describe backend deployment after failed rollout # log
        if: failure()
        run: |
          kubectl describe deployment backend -n prod

      - name: Show pod details
        if: failure()
        run: |
          kubectl get pods -n prod -o wide
          kubectl describe pods -n prod
          kubectl logs -l app=backend -n prod --tail=100

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend -n prod --timeout=180s