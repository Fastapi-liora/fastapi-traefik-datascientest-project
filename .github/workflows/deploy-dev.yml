name: Deploy Dev

on:
  push:
    branches:
      - dev
      - "feat/k8s-dev-setup"

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare & Deploy to Minikube
        run: |
          # 1. Umgebungsvariablen für den Runner setzen (WICHTIG!)
          export HOME=/home/ipatsaf
          export PATH=$PATH:/usr/local/bin
          export KUBECONFIG=$HOME/.kube/config
          
          # 2. Auto-Start: Prüfen, ob Minikube läuft
          # Wenn nicht "Running", wird der Cluster automatisch gestartet
          if ! minikube status | grep -q "Running"; then
            echo "Minikube ist gestoppt. Starte Cluster..."
            minikube start --driver=docker --memory=2560 --cpus=2
          fi
          
          # 3. Verbindung reparieren
          # update-context stellt sicher, dass die Kubeconfig zur aktuellen IP passt
          minikube update-context
          
          # 4. Manifeste anwenden
          # --validate=false verhindert Netzwerk-Timeouts während der Validierung
          minikube kubectl -- apply -f k8s/dev --validate=false

      - name: Restart deployments
        run: |
          export HOME=/home/ipatsaf
          minikube kubectl -- rollout restart deployment/backend -n dev
          minikube kubectl -- rollout restart deployment/frontend -n dev

      - name: Check Status
        run: |
          export HOME=/home/ipatsaf
          minikube kubectl -- get pods -n dev