name: Deploy Dev

on:
  push:
    branches:
      - dev
      - "feat/k8s-dev-setup"

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare & Deploy to Minikube
        run: |
          # 1. Umgebungsvariablen für den Runner setzen (WICHTIG!)
          export HOME=/home/ipatsaf
          export PATH=$PATH:/usr/local/bin
          export KUBECONFIG=$HOME/.kube/config
          
          # 2. Prüfen, ob Minikube erreichbar ist
          # update-context repariert die interne IP-Verbindung
          minikube update-context
          
          # 3. Manifeste anwenden
          # --validate=false überspringt den Pre-Check, der oft am Netzwerk scheitert
          minikube kubectl -- apply -f k8s/dev --validate=false

      - name: Restart deployments
        run: |
          export HOME=/home/ipatsaf
          minikube kubectl -- rollout restart deployment/backend -n dev
          minikube kubectl -- rollout restart deployment/frontend -n dev

      - name: Check Status
        run: |
          export HOME=/home/ipatsaf
          minikube kubectl -- get pods -n dev