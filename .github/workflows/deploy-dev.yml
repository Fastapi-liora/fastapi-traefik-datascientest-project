name: Deploy Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fastapi-liora
  BACKEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-backend
  FRONTEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-frontend

jobs:
  test:
    runs-on: self-hosted

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          uv sync --dev
          uv pip install pytest-cov

      - name: Run backend tests
        working-directory: ./backend
        env:
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5433"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: "app"
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: "test@example.com"
          SMTP_PASSWORD: "test"
          SMTP_TLS: "true"
          EMAILS_FROM_EMAIL: "test@example.com"
          EMAILS_FROM_NAME: "test@example.com"
          EMAILS_ENABLED: "true"
        run: |
          if [ -d app/tests ]; then
            # Lösche pytest.ini temporär
            rm -f pytest.ini
            # Führe Tests ohne Coverage aus
            uv run pytest app/tests/ -v --no-cov
          else
            echo "No backend tests found, skipping."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: ./frontend
        run: |
          if [ -d tests/e2e ]; then
            npx playwright test tests/e2e/ --project=chromium
          else
            echo "No frontend E2E tests found, skipping."
          fi

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/

  build-and-push:
    runs-on: self-hosted
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./backend

      - name: Build frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./frontend

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }}

      - name: Push frontend image
        run: |
          docker push $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }}

  deploy-dev:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG_DEV }}" > $HOME/.kube/config-ci
          chmod 600 $HOME/.kube/config-ci
          echo "KUBECONFIG=$HOME/.kube/config-ci" >> $GITHUB_ENV

      - name: Verify kubectl and cluster access
        run: |
          echo "User: $(whoami)"
          echo "Home: $HOME"
          which kubectl
          kubectl version --client
          kubectl config current-context
          kubectl get ns

      - name: Apply dev manifests
        run: |
          kubectl apply -f k8s/dev

      - name: Check resources after apply
        run: |
          echo "=== Namespaces ==="
          kubectl get ns
          echo "=== Deployments in dev ==="
          kubectl get deployments -n dev -o wide
          echo "=== ReplicaSets in dev ==="
          kubectl get rs -n dev
          echo "=== Pods in dev ==="
          kubectl get pods -n dev -o wide
          echo "=== Services in dev ==="
          kubectl get svc -n dev

      - name: Update backend image in deployment
        run: |
          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }} \
            -n dev

      - name: Update frontend image in deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }} \
            -n dev

      - name: Check deployment state before rollout wait
        run: |
          echo "=== Backend deployment ==="
          kubectl get deployment backend -n dev -o wide
          kubectl describe deployment backend -n dev
          echo "=== Frontend deployment ==="
          kubectl get deployment frontend -n dev -o wide
          kubectl describe deployment frontend -n dev
          echo "=== ReplicaSets ==="
          kubectl get rs -n dev
          echo "=== Pods ==="
          kubectl get pods -n dev -o wide

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend -n dev --timeout=180s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend -n dev --timeout=180s

      - name: Final resource check
        if: always()
        run: |
          echo "=== Final pods ==="
          kubectl get pods -n dev -o wide
          echo "=== Final services ==="
          kubectl get svc -n dev
          echo "=== Final deployments ==="
          kubectl get deployments -n dev -o wide
          echo "=== Final ReplicaSets ==="
          kubectl get rs -n dev

      - name: Debug events and pod descriptions
        if: always()
        run: |
          echo "=== Events ==="
          kubectl get events -n dev --sort-by=.metadata.creationTimestamp || true

          echo "=== Describe backend deployment ==="
          kubectl describe deployment backend -n dev || true

          echo "=== Describe frontend deployment ==="
          kubectl describe deployment frontend -n dev || true

          echo "=== Describe all pods in dev ==="
          for pod in $(kubectl get pods -n dev -o jsonpath='{.items[*].metadata.name}'); do
            echo "----- DESCRIBE POD: $pod -----"
            kubectl describe pod "$pod" -n dev || true
          done

      - name: Backend logs
        if: always()
        run: |
          echo "=== Backend pod logs ==="
          for pod in $(kubectl get pods -n dev -o jsonpath='{.items[*].metadata.name}'); do
            if [[ "$pod" == backend* ]]; then
              echo "----- LOGS FOR $pod -----"
              kubectl logs "$pod" -n dev --all-containers=true --tail=200 || true
              echo "----- PREVIOUS LOGS FOR $pod -----"
              kubectl logs "$pod" -n dev --all-containers=true --tail=200 --previous || true
            fi
          done

      - name: Frontend logs
        if: always()
        run: |
          echo "=== Frontend pod logs ==="
          for pod in $(kubectl get pods -n dev -o jsonpath='{.items[*].metadata.name}'); do
            if [[ "$pod" == frontend* ]]; then
              echo "----- LOGS FOR $pod -----"
              kubectl logs "$pod" -n dev --all-containers=true --tail=200 || true
              echo "----- PREVIOUS LOGS FOR $pod -----"
              kubectl logs "$pod" -n dev --all-containers=true --tail=200 --previous || true
            fi
          done
