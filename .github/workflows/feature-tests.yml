name: Feature Branch Tests

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [feature/**]

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'backend') || contains(github.ref, 'backend') || github.base_ref == 'dev'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      
      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit/ -v -m unit

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    if: github.base_ref == 'dev' || github.base_ref == 'main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      
      - name: Start PostgreSQL
        run: |
          docker run -d \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=test_db \
            -p 5432:5432 \
            postgres:15
          sleep 5
      
      - name: Run migrations
        run: |
          cd backend
          export DATABASE_URL=postgresql://postgres:testpass@localhost/test_db
          alembic upgrade head
      
      - name: Run integration tests
        run: |
          cd backend
          export DATABASE_URL=postgresql://postgres:testpass@localhost/test_db
          pytest tests/integration/ -v -m integration

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'frontend') || contains(github.ref, 'frontend') || github.base_ref == 'dev'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run unit tests
        run: |
          cd frontend
          npm run test:unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-integration-tests
    if: github.base_ref == 'dev' || github.base_ref == 'main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e
