name: Deploy Production

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fastapi-liora
  BACKEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-backend
  FRONTEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-frontend
  K8S_ENV: prod

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - production
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag from release
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./backend

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./frontend

      - name: Push backend image
        run: docker push $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }}

      - name: Push frontend image
        run: docker push $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }}

  deploy-prod:
    runs-on:
      - self-hosted
      - production
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG_PROD }}" > $HOME/.kube/config-ci
          chmod 600 $HOME/.kube/config-ci
          echo "KUBECONFIG=$HOME/.kube/config-ci" >> $GITHUB_ENV

      - name: Apply prod manifests
        run: kubectl apply -f k8s/${K8S_ENV}

      - name: Update backend image in deployment
        run: |
          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${K8S_ENV}

      - name: Update frontend image in deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${K8S_ENV}

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n ${K8S_ENV} --timeout=300s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend -n ${K8S_ENV} --timeout=300s
