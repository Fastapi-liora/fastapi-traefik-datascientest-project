name: Deploy to Staging

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  DEPLOY_TARGET: kubernetes
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fastapi-liora
  BACKEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-backend
  FRONTEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-frontend
  K8S_ENV: staging

jobs:
  deploy-staging:
    # Do not deploy in the main repository, only in user projects
    if: github.repository_owner != 'fastapi'
    runs-on:
      - self-hosted
      - staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./backend

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }} ./frontend

      - name: Push backend image
        run: docker push $BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }}

      - name: Push frontend image
        run: docker push $FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG_STAGING }}" > $HOME/.kube/config-ci
          chmod 600 $HOME/.kube/config-ci
          echo "KUBECONFIG=$HOME/.kube/config-ci" >> $GITHUB_ENV

      - name: Apply staging manifests
        run: kubectl apply -f k8s/${K8S_ENV}

      - name: Update backend image in deployment
        run: |
          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:${{ steps.meta.outputs.image_tag }} \
            -n ${K8S_ENV}

      - name: Update frontend image in deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:${{ steps.meta.outputs.image_tag }} \
            -n ${K8S_ENV}

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n ${K8S_ENV} --timeout=240s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend -n ${K8S_ENV} --timeout=240s
