[pytest]
# Test paths
testpaths = tests

# File patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options
addopts = 
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term
    --cov-report=html:htmlcov
    --cov-fail-under=70

# Custom markers
markers =
    unit: Unit tests (no database required)
    integration: Integration tests (require database connection)
    slow: Tests that take longer to run
    e2e: End-to-end tests

# Exclude directories
norecursedirs = .git venv .venv __pycache__ app/tests_backup

# Verbose output
verbose = 1
