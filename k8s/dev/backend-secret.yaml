apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dev
type: Opaque
stringData:
  # Werte nur via Secret-Manager/CI einsetzen, nie als Klartext committen.
  POSTGRES_PASSWORD: "__INJECTED_AT_DEPLOY_TIME__"
  SECRET_KEY: "__INJECTED_AT_DEPLOY_TIME__"
