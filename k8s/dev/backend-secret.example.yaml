apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dev
type: Opaque
stringData:
  # Template-Datei ohne echte Werte.
  POSTGRES_PASSWORD: "__REQUIRED_POSTGRES_PASSWORD__"
  SECRET_KEY: "__REQUIRED_SECRET_KEY__"
  DATABASE_URL: "postgresql://postgres:__REQUIRED_POSTGRES_PASSWORD__@db-dev:5432/app"
  APP_ENV: "development"
