# BEFEHL ZUM AUSFÜHREN:
# ansible-playbook -i inventory.ini setup-vm.yml -K

- name: "Konfiguration der neuen Test-VM inkl. Namespace-Replikation"
  hosts: fastapivm_test
  become: yes
  vars:
    # Verhindert Warnungen bezüglich der Python-Version
    ansible_python_interpreter: /usr/bin/python3.12
    # Definition der Namespaces, die automatisch repliziert werden sollen
    k8s_namespaces:
      - dev
      - test

  tasks:
    - name: "System-Update durchführen"
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: "Docker & Tools installieren"
      apt:
        name: 
          - docker.io
          - curl
          - git
          - socat
          - conntrack
        state: present

    - name: "User zur Docker-Gruppe hinzufügen"
      user:
        name: ipatsaf
        groups: docker
        append: yes

    - name: "Minikube & Kubectl herunterladen"
      get_url:
        url: "{{ item.url }}"
        dest: "/usr/local/bin/{{ item.name }}"
        mode: '0755'
      loop:
        - { name: 'minikube', url: 'https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64' }
        - { name: 'kubectl', url: 'https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl' }

    - name: "Prüfen ob Minikube bereits läuft"
      become: yes
      become_user: ipatsaf
      command: minikube status
      register: minikube_status
      ignore_errors: yes
      changed_when: false

    - name: "Altes Minikube Profil löschen (bei Fehlern)"
      become: yes
      become_user: ipatsaf
      command: minikube delete
      when: "'Running' not in minikube_status.stdout"
      ignore_errors: yes

    - name: "Minikube starten"
      become: yes
      become_user: ipatsaf
      # Wir nutzen 2048 (2GB), das ist der stabilste Wert für 4GB VMs
      command: minikube start --driver=docker --memory=2048 --cpus=2
      when: "'Running' not in minikube_status.stdout"

    # --- FIX: Wir nutzen 'shell' statt 'command' für die Pipe ---
    - name: "Kubernetes Namespaces automatisch erstellen"
      become: yes
      become_user: ipatsaf
      shell: "minikube kubectl -- create namespace {{ item }} --dry-run=client -o yaml | minikube kubectl -- apply -f -"
      loop: "{{ k8s_namespaces }}"
      register: ns_result
      changed_when: "'created' in ns_result.stdout"

    - name: "Projekt-Manifeste automatisch anwenden"
      become: yes
      become_user: ipatsaf
      # Nutzt ebenfalls 'shell' für sicherere Pfadauflösung
      shell: "minikube kubectl -- apply -f /home/ipatsaf/fastapi-traefik-datascientest-project/k8s/dev/"
      ignore_errors: yes